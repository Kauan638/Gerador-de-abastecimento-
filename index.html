<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Gerador de Abastecimento PCP
    </title>

    <link rel="stylesheet" href="style.css">

    <!-- XLSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Papa Parse -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

    <div class="container">

        <h1>
            🚚 Gerador de Abastecimento PCP
        </h1>

        <!-- ===================================== -->
        <!-- UPLOADS -->
        <!-- ===================================== -->

        <div class="card">

            <h2>
                Arquivos
            </h2>

            <div class="upload-area">

                <!-- PEDIDOS -->

                <div class="upload-box">

                    <label>
                        📊 Metabase Pedidos
                    </label>

                    <label
                        class="upload-btn"
                        for="arquivoPedidos">

                        Selecionar Arquivo

                    </label>

                    <input
                        type="file"
                        id="arquivoPedidos"
                        accept=".xlsx,.xls">

                    <div
                        class="upload-nome"
                        id="nomePedidos">

                        Nenhum arquivo selecionado

                    </div>

                </div>

                <!-- POSIÇÕES -->

                <div class="upload-box">

                    <label>
                        📦 Posição de Endereços
                    </label>

                    <label
                        class="upload-btn"
                        for="arquivoPosicoes">

                        Selecionar Arquivo

                    </label>

                    <input
                        type="file"
                        id="arquivoPosicoes"
                        accept=".txt,.csv">

                    <div
                        class="upload-nome"
                        id="nomePosicoes">

                        Nenhum arquivo selecionado

                    </div>

                </div>

            </div>

            <br>

        <div class="acoes">

    <button
        class="btn-processar"
        onclick="processar()">

        🚀 Processar Dados

    </button>

   

</div>

        </div>

        <!-- ===================================== -->
        <!-- KPIs -->
        <!-- ===================================== -->

        <div class="kpis">

            <div class="kpi-card">

                <h3>
                    Total SKUs
                </h3>

                <span id="kpiSkus">
                    0
                </span>

            </div>

            <div class="kpi-card">

                <h3>
                    Abastecer
                </h3>

                <span id="kpiAbastecer">
                    0
                </span>

            </div>

            <div class="kpi-card">

                <h3>
                    Unidades
                </h3>

                <span id="kpiUnidades">
                    0
                </span>

            </div>

            <div class="kpi-card">

                <h3>
                    Sem Apanha
                </h3>

                <span id="kpiSemApanha">
                    0
                </span>

            </div>

        </div>

        <!-- ===================================== -->
        <!-- FILTROS -->
        <!-- ===================================== -->

        <div class="card">

            <h2>
                Filtros
            </h2>

            <div class="filtros">

                <input
                    type="text"
                    id="filtroSKU"
                    placeholder="Filtrar SKU">

                <select id="filtroStatus">

                    <option value="">
                        Todos Status
                    </option>

                    <option value="ABASTECER">
                        ABASTECER
                    </option>

                    <option value="OK">
                        OK
                    </option>

                    <option value="SEM APANHA">
                        SEM APANHA
                    </option>

                </select>

            </div>

        </div>

        <!-- ===================================== -->
        <!-- RESULTADO -->
        <!-- ===================================== -->

        <div class="card">

            <h2>
                Resultado
            </h2>

            <button
                class="btn-exportar"
                onclick="exportarExcel()">

                📥 Exportar Excel

            </button>

            <div class="tabela-container">

                <table>

                    <thead>

                        <tr>

                            <th>SKU</th>

                            <th>Descrição</th>

                            <th>Pedido</th>

                            <th>Endereço</th>

                            <th>Saldo Atual</th>

                            <th>Norma</th>

                            <th>Falta</th>

                            <th>Status</th>
                            
                            <th>Prioridade</th>
                            

                        </tr>

                    </thead>

                    <tbody id="tbodyResultados">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- ===================================== -->
    <!-- LOADING -->
    <!-- ===================================== -->

    <div
        class="loading"
        id="loading">

        <div class="spinner"></div>

        <p>
            Processando arquivos...
        </p>

    </div>

    <script src="script.js"></script>

</body>

</html>
